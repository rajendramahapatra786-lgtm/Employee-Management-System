<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">
</head>
<body>

    <div id="navbar"></div>

    <div class="container">

        <div id="sidebar"></div>

        <div class="main-content">

            <h2>Add / Edit Employee</h2>

            <form id="employeeForm">

                <h3>Basic Information</h3>

                <input type="text" id="empId" placeholder="Employee ID" required>
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="phone" placeholder="Phone Number" required>
                <input type="text" id="department" placeholder="Department">
                <input type="text" id="designation" placeholder="Designation">
                <input type="date" id="doj">

                <h3>Salary Details</h3>

                <input type="number" id="basicSalary" placeholder="Basic Salary" required>
                <input type="number" id="bonus" placeholder="Bonus" value="0">
                <input type="number" id="overtime" placeholder="Overtime Pay" value="0">

                <p><strong>Net Salary:</strong> ₹ <span id="netSalary">0</span></p>

                <h3>Attendance</h3>

                <input type="number" id="presentDays" placeholder="Present Days">
                <input type="number" id="absentDays" placeholder="Absent Days">
                <input type="number" id="leaveBalance" placeholder="Leave Balance">

                <h3>Performance</h3>

                <input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5">
                <input type="number" id="appraisal" placeholder="Appraisal %">
                <select id="promotion">
                    <option value="No">Promotion - No</option>
                    <option value="Yes">Promotion - Yes</option>
                </select>

                <h3>Bank Details</h3>

                <input type="text" id="bankName" placeholder="Bank Name">
                <input type="text" id="accountNumber" placeholder="Account Number">
                <input type="text" id="ifsc" placeholder="IFSC Code">

                <h3>Status</h3>

                <select id="status">
                    <option value="Active">Active</option>
                    <option value="On Leave">On Leave</option>
                    <option value="Resigned">Resigned</option>
                </select>

                <br><br>
                <button type="submit">Save Employee</button>

            </form>

        </div>

    </div>

<script src="js/components.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>

</body>
</html>
