<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Employees</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <div id="sidebar"></div>

        <div class="main-content">
            <div id="navbar"></div>

            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-users"></i> Employee Management</h2>
                    <button class="btn-primary" onclick="showAddModal()">
                        <i class="fas fa-plus"></i> Add Employee
                    </button>
                </div>

                <div class="table-responsive">
                    <table id="employeesTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Position</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeesList">
                            <tr>
                                <td colspan="6" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add Employee</h2>
            <form id="employeeForm">
                <input type="hidden" id="empId">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="empName" required
                        oninput="this.value = this.value.replace(/[^A-Za-z ]/g, '')">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="empEmail" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Department</label>
                        <select id="empDepartment" required>
                            <option value="">Select</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="Sales">Sales</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Position</label>
                        <input type="text" id="empPosition" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Join Date</label>
                        <input type="date" id="empJoinDate" required>
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select id="empStatus">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Salary (₹)</label>
                   <input type="number" id="empSalary" placeholder="Enter monthly salary" required min="1" step="1" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>

                <button type="submit" class="btn-primary">Save Employee</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/employees.js"></script>
    <script src="js/navbar.js"></script>
</body>

</html>
