<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Attendance</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <div id="sidebar"></div>
        
        <div class="main-content">
            <div id="navbar"></div>
            
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-calendar-check"></i> Today's Attendance</h2>
                    <button class="btn-primary" onclick="showMarkModal()">
                        <i class="fas fa-check"></i> Mark Attendance
                    </button>
                </div>
                
                <div class="table-responsive">
                    <table id="attendanceTable">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceList">
                            <tr><td colspan="5" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Mark Attendance Modal -->
    <div id="attendanceModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Mark Attendance</h2>
            <form id="attendanceForm">
                <div class="form-group">
                    <label>Employee</label>
                    <select id="attendanceEmployee" required>
                        <option value="">Select Employee</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Status</label>
                    <select id="attendanceStatus" required>
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                        <option value="Late">Late</option>
                        <option value="Leave">Leave</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Check In</label>
                        <input type="time" id="attendanceIn" value="09:00">
                    </div>
                    
                    <div class="form-group">
                        <label>Check Out</label>
                        <input type="time" id="attendanceOut" value="18:00">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Save Attendance</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
